var EXTRA_PAD = 60;

function expandUrl(url) {
  var m = url.match(/(.+\.jp2\/)(\d+),(\d+),(\d+),(\d+)(\/full\/0\/default\.jpg)/);
  if (!m) return url;
  var x = Math.max(0, parseInt(m[2]) - EXTRA_PAD);
  var y = Math.max(0, parseInt(m[3]) - EXTRA_PAD);
  var w = parseInt(m[4]) + EXTRA_PAD * 2;
  var h = parseInt(m[5]) + EXTRA_PAD * 2;
  return m[1] + x + ',' + y + ',' + w + ',' + h + m[6];
}

function openFullPageWithHighlight(url) {
  var m = url.match(/\.jp2\/(\d+),(\d+),(\d+),(\d+)\/full\/0\/default\.jpg/);

function getCoordKey(segId, diff, side) {
  const expl = side==="v108" ? diff.v108k : diff.htrk;
  if (expl === null) return null;
  if (expl !== undefined) return expl;
  return `${segId}__${side==="v108" ? diff.v108 : diff.htr}`;
}

// Returns agreement status for each column: "agree" | "outlier" | "neutral"
function getAgreement(v108, htr, sef) {
  const norm = s => (s||"").trim().replace(/\s+/g," ");
  const v = norm(v108), h = norm(htr), s = norm(sef);
  if (!s) return { v108:"neutral", htr:"neutral", sef:"neutral" };
  if (v === h && h === s) return { v108:"neutral", htr:"neutral", sef:"neutral" };
  if (v === h && v !== s) return { v108:"agree",   htr:"agree",   sef:"outlier" };
  if (v === s && v !== h) return { v108:"agree",   htr:"outlier", sef:"agree"   };
  if (h === s && h !== v) return { v108:"outlier", htr:"agree",   sef:"agree"   };
  return { v108:"neutral", htr:"neutral", sef:"neutral" };
}

function doExport(annotations,segments) {
  const rows=["Segment\tRef\t#\tV108\tHTR\tSefaria\tCorrect Reading\tCategory\tNotes"];
  for(const seg of segments){
    seg.diffs.forEach((d,i)=>{
      const a=annotations[`${seg.id}_${i}`]||{};
      if(a.cat||a.notes)
        rows.push([seg.label,seg.ref,i+1,d.v108,d.htr,d.sef||"",a.correct||"",a.cat||"",a.notes||""].join("\t"));
    });
  }
  const blob=new Blob([rows.join("\n")],{type:"text/tsv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="vat_ebr_108_mk2a_annotations.tsv";a.click();
}
